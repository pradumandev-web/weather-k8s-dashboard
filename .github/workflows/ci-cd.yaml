name: CI/CD — Weather Dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USER: ${{ secrets.DOCKER_HUB_USER }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build & Push Docker Images ──────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USER }}/weather-backend:latest
            ${{ env.DOCKER_HUB_USER }}/weather-backend:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USER }}/weather-frontend:latest
            ${{ env.DOCKER_HUB_USER }}/weather-frontend:${{ github.sha }}

  # ── Job 2: Security Scan (Trivy) ───────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_HUB_USER }}/weather-backend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_HUB_USER }}/weather-frontend:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ── Job 3: Update Helm values with new image tag ───────────────────────────
  update-helm:
    name: Update Helm Image Tag
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.ref == 'refs/heads/main'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in values.yaml
        run: |
          sed -i "s|tag: latest|tag: ${{ github.sha }}|g" helm/weather-chart/values.yaml

      - name: Commit updated values.yaml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/weather-chart/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
